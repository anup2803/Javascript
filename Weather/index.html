<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="main-container">
      <h1 class="title">Weather Dashboard</h1>
      <!-- search -->
      <div class="search-sections">
        <input type="text" placeholder="Search cities" id="cityInput" />
      </div>

      <!-- main display weather -->
      <div class="main-sections">
        <div class="inner-details">
          <div class="weatherIcon">
            <img id="weatherIcon" />
          </div>
          <div class="weather-details">
            <h2 id="cityName"></h2>

            <h1 id="temperature"></h1>
            <p id="description"></p>

            <p>Humidity : <span id="humidity"></span></p>

            <p>Wind : <span id="wind"></span></p>
          </div>
        </div>
      </div>

      <!-- different citys weathers -->
      <div class="diff-citys">
        <h2 class="forecast">3 Day Forecast</h2>

        <div class="cards-groups" id="forecastContainer"></div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
